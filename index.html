<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>מדריך אינטראקטיבי – מוזיאון</title>
  <link rel="stylesheet" href="assets/styles.css"/>
  <!-- Google tag (gtag.js) -->
  <script>
    (function () {
      // Set staging ID when available. If empty, staging falls back to production ID.
      const GA_IDS = {
        production: "G-Q6TTZPPY3H",
        staging: "G-CQCBKNQL4M",
      };

      const host = String(window.location.hostname || "").toLowerCase();
      const isProduction = host === "museum-chatbot1.netlify.app";
      const isStaging = host.startsWith("staging--") || host.includes("--museum-chatbot1.netlify.app");

      let measurementId = "";
      if (isProduction) measurementId = GA_IDS.production;
      else if (isStaging) measurementId = GA_IDS.staging || GA_IDS.production;
      else measurementId = GA_IDS.production;

      if (!measurementId) return;

      window.dataLayer = window.dataLayer || [];
      function gtag(){window.dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag("js", new Date());
      gtag("config", measurementId);

      const s = document.createElement("script");
      s.async = true;
      s.src = "https://www.googletagmanager.com/gtag/js?id=" + encodeURIComponent(measurementId);
      document.head.appendChild(s);
    })();
  </script>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <img id="museumLogo" src="assets/logo.png" alt="לוגו מוזיאון"/>
        <div>
          <div class="museum-name" id="museumName">מוזיאון</div>
          <div class="small">בחר/י מיצג לדוגמה</div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="usage-pill" title="סך השאלות שנשאלו החודש (לפי המעקב בשרת)">
          <div class="usage-pill__label">שימוש החודש</div>
          <div class="usage-pill__value">
            <span id="usageCount">…</span>
            <span class="usage-pill__sep">·</span>
            <span id="usageMonth">—</span>
          </div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="hero hero--exhibition">
          <img id="exhibitionImg" alt="תמונה ראשית לתערוכה" />
        </div>

        <div class="content">
          <h1 class="h1" id="exhibitionTitle">תערוכה</h1>
          <p class="small" id="exhibitionCurator" style="display:none;"></p>
          <p class="h2" id="exhibitionSummary"></p>
        </div>
      </div>

      <div class="card">
        <div class="content">
          <div class="section-title">מיצגים</div>
          <div id="list" class="exhibitList"></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="content">
        <div class="section-title">התפלגות שימוש החודש לפי מיצג</div>
        <div id="usageBreakdown" class="usageBreakdown">
          <div class="small">טוען נתונים…</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="content">
        <div class="insights-toolbar">
          <div class="section-title" style="margin:0;">תובנות שימוש</div>
          <label class="small" for="analyticsRangeDays" style="display:flex;align-items:center;gap:8px;">
            טווח:
            <select id="analyticsRangeDays">
              <option value="7">7 ימים</option>
              <option value="30" selected>30 ימים</option>
              <option value="90">90 ימים</option>
            </select>
          </label>
        </div>
        <div id="analyticsInsights">
          <div class="small">טוען נתונים…</div>
        </div>
      </div>
    </div>
    <div class="powered-by" aria-label="credit">
      <a href="https://www.game-factory.studio/" target="_blank" rel="noopener noreferrer">Powered by <span>Game Factory</span></a>
    </div>
  </div>

  <script type="module" src="assets/index.js"></script>
</body>
</html>
